version: "3.8"

services:
  # ==========================================
  # 🌐 Frontend & Reverse Proxy
  # ==========================================
  medtutor-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medtutor-frontend
    ports:
      - "80:80"   # Exposição principal da VPS pro tráfego Web
    depends_on:
      - medtutor-api
    networks:
      - medtutor-net
    restart: always

  # ==========================================
  # 🧠 Backend Core & IA
  # ==========================================
  medtutor-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medtutor-api
    # Não expõe porta pro host (segurança). O Nginx/frontend repassa as requests!
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@medtutor-postgres:5432/medtutor_db}
      - REDIS_URL=${REDIS_URL:-redis://medtutor-redis:6379/0}
      - CHROMA_URL=${CHROMA_URL:-http://medtutor-chroma:8000}
      # Via ADR-0006: Injeção Zsh da host enviando variável sensível pra memória do container
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis
      - chromadb
    networks:
      - medtutor-net
    restart: always

  # ==========================================
  # 💾 Data Layers
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: medtutor-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-medtutor_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medtutor-net
    restart: always

  redis:
    image: redis:7-alpine
    container_name: medtutor-redis
    volumes:
      - redis_data:/data
    networks:
      - medtutor-net
    restart: always

  chromadb:
    image: chromadb/chroma:latest
    container_name: medtutor-chroma
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - medtutor-net
    restart: always

  # ==========================================
  # 📊 Observability Stack (PLG)
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: medtutor-prometheus
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - medtutor-net
    restart: always

  loki:
    image: grafana/loki:2.8.2
    container_name: medtutor-loki
    volumes:
      - ./infra/observability/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - medtutor-net
    restart: always

  promtail:
    image: grafana/promtail:2.8.2
    container_name: medtutor-promtail
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/observability/promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - medtutor-net
    restart: always

  grafana:
    image: grafana/grafana:9.5.2
    container_name: medtutor-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin123}
    volumes:
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - medtutor-net
    restart: always

networks:
  medtutor-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  prometheus_data:
  loki_data:
  grafana_data:
