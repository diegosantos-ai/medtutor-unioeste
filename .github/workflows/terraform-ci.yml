name: Terraform CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./aws/envs/dev

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.2

      - name: Terraform Init (sem backend)
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate

    defaults:
      run:
        working-directory: ./aws/envs/dev

    env:
      AWS_REGION: ${{ vars.TF_VAR_AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_AWS_REGION }}
      TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
      TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
      TF_VAR_owner: ${{ vars.TF_VAR_OWNER }}
      TF_VAR_ssh_allowed_cidr: ${{ vars.TF_VAR_SSH_ALLOWED_CIDR }}
      TF_VAR_key_pair_name: ${{ vars.TF_VAR_KEY_PAIR_NAME }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false || (echo "Terraform plan failed with exit code $?"; exit 1)
