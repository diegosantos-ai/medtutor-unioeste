name: Terraform CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform-fmt:
    name: Terraform Fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.2

      - name: Verificar formatação
        run: terraform fmt -check -recursive aws

  terraform-validate-plan:
    name: Terraform Validate e Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: terraform-fmt
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME || 'med-tutor' }}
      TF_VAR_environment: ${{ matrix.environment }}
      TF_VAR_owner: ${{ vars.TF_OWNER || 'PlatformTeam' }}
      TF_VAR_ssh_allowed_cidr: ${{ vars.TF_SSH_ALLOWED_CIDR || '127.0.0.1/32' }}
      TF_VAR_key_pair_name: ${{ vars.TF_KEY_PAIR_NAME || 'placeholder-key' }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.2

      - name: Terraform Init
        working-directory: ./aws/envs/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./aws/envs/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./aws/envs/${{ matrix.environment }}
        run: terraform plan -input=false -lock=false -no-color -var-file=terraform.tfvars.example
