services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medtutor-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_INTERNAL_PORT:-8000}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-60}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/medtutor_db}
      CHROMA_URL: ${CHROMA_URL:-http://chromadb:8000}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "${BACKEND_PORT:-8002}:${BACKEND_INTERNAL_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${BACKEND_INTERNAL_PORT:-8000}/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - medtutor-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: medtutor-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medtutor-net

  postgres:
    image: postgres:16-alpine
    container_name: medtutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-medtutor_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-medtutor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medtutor-net

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: medtutor-chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: ${CHROMA_IS_PERSISTENT:-TRUE}
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - medtutor-net

networks:
  medtutor-net:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
