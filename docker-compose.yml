services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medtutor-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_INTERNAL_PORT:-8000}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-60}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/medtutor_db}
      CHROMA_URL: ${CHROMA_URL:-http://chromadb:8000}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "${BACKEND_PORT:-8002}:${BACKEND_INTERNAL_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${BACKEND_INTERNAL_PORT:-8000}/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - medtutor-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: medtutor-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medtutor-net

  postgres:
    image: postgres:16-alpine
    container_name: medtutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-medtutor_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-medtutor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medtutor-net

  chromadb:
    image: chromadb/chroma:1.5.5
    container_name: medtutor-chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: ${CHROMA_IS_PERSISTENT:-TRUE}
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - medtutor-net

  loki:
    image: grafana/loki:2.9.8
    container_name: medtutor-loki
    restart: unless-stopped
    user: "0:0"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    networks:
      - medtutor-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: medtutor-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - backend
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - medtutor-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: medtutor-promtail
    restart: unless-stopped
    user: "0:0"
    command: -config.file=/etc/promtail/config.yml
    environment:
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.44}
    depends_on:
      - loki
      - backend
      - frontend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/observability/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp/promtail
    networks:
      - medtutor-net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: medtutor-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - loki
      - prometheus
    volumes:
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - medtutor-net

networks:
  medtutor-net:
    driver: bridge
  dev-workspace-net:
    external: true
    name: dev-workspace-net

volumes:
  postgres_data:
  chroma_data:
  loki_data:
  prometheus_data:
  promtail_positions:
  grafana_data:
